name: Deploy to Genea Portal

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Probe secret format
        env:
          KEY: ${{ secrets.PORTAL_DEPLOY_KEY }}
        run: |
          echo "length: ${#KEY}"
          if [[ "$KEY" =~ ^[0-9a-f]{64}$ ]]; then
            echo "format: 64-char lowercase hex (matches portal-generated key) [OK]"
          else
            echo "::error::Secret is not 64-char lowercase hex. Re-paste the key from the portal."
            # Print char-class summary without leaking the value:
            echo "summary: hex_chars=$(echo -n "$KEY" | tr -cd '[:xdigit:]' | wc -c) total=${#KEY}"
            exit 1
          fi

      - name: Deploy (verbose)
        env:
          KEY: ${{ secrets.PORTAL_DEPLOY_KEY }}
        run: |
          # Stage the portal-ready (-PR) build inside assets/
          # so the portal can serve files at /tools/<slug>/assets/...
          # The original index.html at repo root is the legacy/local build and is NOT shipped.
          mkdir -p staging/assets
          rsync -a bouncy-cat-PR/ staging/assets/
          (cd staging && zip -r ../deploy.zip assets)
          echo "--- zip contents ---"
          unzip -l deploy.zip
          echo "--- end contents ---"
          # -f removed so we see the response body. -v shows full request/response.
          # -D - dumps response headers to stdout. -o /tmp/body captures the response body.
          curl -v -X POST \
            "https://genea-tool-portal.azurewebsites.net/api/deploy/bouncy-cat-test" \
            -H "X-Deploy-Key: $KEY" \
            -F "files=@deploy.zip" \
            -D - \
            -o /tmp/body \
            --max-time 120 || true
          echo "--- response body ---"
          cat /tmp/body
          echo
          echo "--- end body ---"

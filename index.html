<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bouncy Cat</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: system-ui, sans-serif;
      color: #eee;
    }
    .label {
      position: fixed;
      top: 12px;
      left: 12px;
      font-size: 14px;
      opacity: 0.6;
      user-select: none;
    }
    #cat {
      position: absolute;
      font-size: 64px;
      will-change: transform, filter;
      user-select: none;
      cursor: pointer;
      transition: filter 0.15s ease-out;
    }
  </style>
</head>
<body>
  <div class="label">click the cat to speed it up · color + size change on every bump</div>
  <div id="cat">🐈</div>

  <script>
    const cat = document.getElementById('cat');
    const MIN_SIZE = 32;
    const MAX_SIZE = 140;

    let x = 100, y = 100;
    let vx = 3, vy = 2.5;
    let hue = 0;
    let facing = 1;
    let size = 64;

    function applyLook() {
      cat.style.transform = `scaleX(${facing})`;
      cat.style.filter = `hue-rotate(${hue}deg) saturate(1.4)`;
      cat.style.fontSize = size + 'px';
    }

    function bump() {
      // Shift hue by an amount that doesn't repeat every 9 bumps,
      // so the cat actually feels like it's cycling through colors.
      hue = (hue + 47) % 360;
      // Random size within bounds. Avoid landing exactly on the previous size.
      let next;
      do {
        next = Math.round(MIN_SIZE + Math.random() * (MAX_SIZE - MIN_SIZE));
      } while (Math.abs(next - size) < 8);
      size = next;
      applyLook();
    }

    function step() {
      let w = window.innerWidth - cat.offsetWidth;
      let h = window.innerHeight - cat.offsetHeight;

      x += vx;
      y += vy;

      let bumped = false;
      if (x <= 0 || x >= w) {
        vx = -vx;
        facing = vx > 0 ? 1 : -1;
        bumped = true;
      }
      if (y <= 0 || y >= h) {
        vy = -vy;
        bumped = true;
      }

      if (bumped) {
        bump();
        // Re-measure with the NEW size so a grown cat doesn't clip the wall
        // and trigger an immediate second bump next frame.
        w = window.innerWidth - cat.offsetWidth;
        h = window.innerHeight - cat.offsetHeight;
        x = Math.max(0, Math.min(x, w));
        y = Math.max(0, Math.min(y, h));
      }

      cat.style.left = x + 'px';
      cat.style.top = y + 'px';

      requestAnimationFrame(step);
    }

    cat.addEventListener('click', () => {
      vx *= 1.3;
      vy *= 1.3;
    });

    applyLook();
    step();
  </script>
</body>
</html>
